plugins {
    id 'java-library'
    id 'maven-publish'
    id 'jacoco'
    id 'me.champeau.jmh' version '0.7.2'
}

// Enable Oracle tests (for unit tests and jmh)
if (project.hasProperty("oracleUser")) {
    println "Enabling Oracle test and jmh dependencies for $oracleUser/*******"
    apply from: 'oracle-build.gradle'
}

test {
    useJUnitPlatform()
}

dependencies {
    api project(":dlock-core")

    testImplementation "org.apache.groovy:groovy-all:4.0.24"
    testImplementation "org.spockframework:spock-core:2.4-groovy-4.0"
    testImplementation 'com.h2database:h2:2.3.232'
    testImplementation "com.zaxxer:HikariCP:6.2.1"
    testImplementation "org.hamcrest:hamcrest:3.0"
    testImplementation "net.bytebuddy:byte-buddy:1.17.5"
    testImplementation "org.objenesis:objenesis:3.4"
    testImplementation "org.junit.jupiter:junit-jupiter-api:5.12.1"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:5.12.1"

    jmh 'com.h2database:h2:2.3.232'
    jmh "com.zaxxer:HikariCP:6.2.1"
}

configurations.jmh {
    canBeResolved = true
}

