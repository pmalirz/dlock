jmh {
    fork = 1
    iterations = 3
    jmhVersion = '1.37'
    profilers = ['gc']
    threads = 12
    warmup = '2s'
    warmupBatchSize = 1
    warmupIterations = 3
    includeTests = true
    jvmArgs = ['-Xms512m', '-Xmx1024m', '-Dlog4j.configurationFile=conf/log4j2.xml', '-Djmh.blackhole.autoDetect=false']
}

jmhJar {
    exclude 'log4j2.xml'
}
